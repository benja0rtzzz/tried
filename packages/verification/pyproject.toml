[project]
name = "tried-verification"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "tried-shared",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "torch>=2.3",
    "triton>=3.0",
    "pydantic>=2.0",
]

[tool.uv.sources]
tried-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/verification"]
