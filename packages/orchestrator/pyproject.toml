[project]
name = "tried-orchestrator"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "tried-shared",
    "httpx>=0.27",
    "ollama>=0.3",
    "pydantic>=2.0",
    "mlx-lm>=0.16",
    "python-dotenv>=1.2.2",
]

[tool.uv.sources]
tried-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestrator"]
