[project]
name = "tried-stats"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "tried-shared",
    "tabulate>=0.9",
]

[tool.uv.sources]
tried-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stats"]
