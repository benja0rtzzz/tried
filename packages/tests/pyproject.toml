[project]
name = "tried-tests"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "tried-orchestrator",
    "tried-shared",
    "pytest>=8.0",
    "python-dotenv>=1.0",
    "uvicorn>=0.29",
    "fastapi>=0.111",
    "httpx>=0.27",
]

[tool.uv.sources]
tried-orchestrator = { workspace = true }
tried-shared       = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["."]

[tool.uv]
package = false
