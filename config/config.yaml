# Experiment-wide control config. Authoritative source of truth for the
# random seed, generation params, and training hyperparameters.
#
# - `inference:` is read by the MLX generator client and the eval runner.
# - `openrouter:` is read by the OpenRouter client (reference baselines).
# - `training:` is the authoritative spec for fine-tuning. The technical
#   per-stage configs that mlx-lm-lora actually consumes live next to this
#   file as `finetuning_sft.yaml` and `finetuning_dpo.yaml`. Those files
#   MUST mirror the values below; the preflight in
#   `orchestrator.improvement.preflight` aborts the run on any mismatch.
#
# Locked at the start of the experiment. Changes require a decision-log
# entry, the same rule as docs/schema.md and docs/tolerance-policy.md.

schema_version: 1

inference:                         # read by MLX client (local Qwen conditions)
  temperature:    0
  max_tokens:     2048
  chat_template:  "Qwen/Qwen2.5-Coder-14B-Instruct"   # tokenizer ID whose apply_chat_template is used on both sides
  seed:           20260522                             # single seed used across the whole experiment

openrouter:                        # read by OpenRouter client (reference baseline conditions)
  base_url:       "https://openrouter.ai/api/v1"
  temperature:    0
  max_completion_tokens: 2048      # OpenRouter uses max_completion_tokens (max_tokens is deprecated)
  seed:           20260522         # forwarded to underlying model; determinism is model-dependent, not guaranteed
  models:
    llama:
      model_id:   "meta-llama/llama-3.3-70b-instruct"
    deepseek:
      model_id:   "deepseek/deepseek-v4-flash"

training:                          # authoritative spec; finetuning_{sft,dpo}.yaml MUST mirror these values
  base_model:     "~/models/qwen-coder-14b-instruct-4bit"   # local MLX 4-bit Instruct base; downloaded by scripts/download_mlx_base_model.sh. DPO loads ~/models/qwen-coder-14b-instruct-4bit-tried-sft/ instead.
  val_split_path: data/improvement/val_split.json
  val_fraction:   0.05
  stratify_by:    op_category
  sft:
    learning_rate:               1.0e-4
    epochs:                      2
    batch_size:                  2
    gradient_accumulation_steps: 8       # effective batch = batch_size × gas = 16
    max_seq_length:              2048
    mask_prompt:                 true    # response-only loss masking
    lora:
      rank:    64
      dropout: 0.1
      scale:   2.0                       # standard LoRA scaling (alpha/rank with alpha=128, rank=64)
  dpo:
    learning_rate:               5.0e-7
    epochs:                      1       # widen to 2 only if val signal supports it
    batch_size:                  1
    gradient_accumulation_steps: 8       # effective batch = 8
    max_seq_length:              4096    # empirical max is 2506; 4096 covers all 1256 sides with headroom
    beta:                        0.1
    lora:
      rank:    64
      dropout: 0.1
      scale:   2.0
